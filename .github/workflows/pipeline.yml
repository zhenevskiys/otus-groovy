name: "CI"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 11
          check-latest: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Make gradlew executable (Linux/macOS)
        run: chmod +x ./gradlew

      # Явно запускаем тесты; build включает test, но так удобнее собирать отчёты
      - name: Run unit tests
        run: ./gradlew --no-daemon clean test

      - name: Upload test reports (JUnit XML, HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/build/test-results/test/**/*.xml
            **/build/reports/tests/test/**
          if-no-files-found: warn

      # Сборка и «толстый» JAR. build прогонит проверку и сборку артефактов,
      # а shadowJar соберёт fat-jar (если подключён shadow plugin).
      - name: Build and assemble Shadow JAR
        run: ./gradlew --no-daemon build shadowJar

      - name: Upload Shadow JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shadow-jars-jdk-11
          path: |
            **/build/libs/*-all.jar
            **/build/libs/*-shadow.jar
          if-no-files-found: warn